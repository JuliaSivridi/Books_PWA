<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Orange rounded background -->
  <rect width="100" height="100" rx="22" fill="#E07E38"/>
  <!-- Book spine (white) -->
  <rect x="20" y="17" width="10" height="66" rx="4" fill="white"/>
  <!-- Book cover (white) -->
  <rect x="26" y="17" width="53" height="66" rx="4" fill="white"/>
  <!-- Page edge suggestion -->
  <rect x="76" y="19" width="4" height="62" rx="2" fill="rgba(255,255,255,0.5)"/>
  <!-- Text lines (darker orange on white cover) -->
  <rect x="36" y="31" width="30" height="5" rx="2.5" fill="#C96E2F" opacity="0.55"/>
  <rect x="36" y="43" width="22" height="4" rx="2"   fill="#C96E2F" opacity="0.38"/>
  <rect x="36" y="53" width="26" height="4" rx="2"   fill="#C96E2F" opacity="0.38"/>
  <rect x="36" y="63" width="18" height="4" rx="2"   fill="#C96E2F" opacity="0.28"/>
</svg>
