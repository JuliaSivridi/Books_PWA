<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Orange rounded background -->
  <rect width="100" height="100" rx="22" fill="#E07E38"/>

  <!-- Spine (solid white strip — the binding) -->
  <rect x="19" y="16" width="9" height="68" rx="3.5" fill="white"/>

  <!-- Cover — outline only, orange shows through -->
  <rect x="24" y="16" width="57" height="68" rx="5"
        fill="none" stroke="white" stroke-width="4.5"/>

  <!-- Text lines inside (solid white) -->
  <rect x="34" y="32" width="34" height="5"   rx="2.5" fill="white"/>
  <rect x="34" y="44" width="26" height="4"   rx="2"   fill="rgba(255,255,255,0.85)"/>
  <rect x="34" y="55" width="30" height="4"   rx="2"   fill="rgba(255,255,255,0.85)"/>
  <rect x="34" y="65" width="21" height="4"   rx="2"   fill="rgba(255,255,255,0.7)"/>
</svg>
